<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GymLog">
<meta name="theme-color" content="#ffffff">
<title>GymLog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #f8f7f4; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; color: #1a1a1a; overscroll-behavior: none; }
:root {
  --accent: #E24B4A; --accent-light: #FDEAEA; --accent-dark: #A32D2D;
  --bg: #f8f7f4; --surface: #ffffff; --border: rgba(0,0,0,0.1);
  --text: #1a1a1a; --muted: #888; --radius: 14px; --radius-sm: 10px;
}
@media (prefers-color-scheme: dark) {
  :root { --bg: #111; --surface: #1c1c1e; --border: rgba(255,255,255,0.1); --text: #f0f0f0; }
  body { background: var(--bg); color: var(--text); }
}
#app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: var(--bg); }
.screen { display: none; min-height: 100vh; padding-bottom: 90px; }
.screen.active { display: block; }
.header { display: flex; align-items: center; gap: 10px; padding: 16px 16px 14px; background: var(--surface); border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 5; }
.header h1 { font-size: 18px; font-weight: 600; flex: 1; color: var(--text); }
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: var(--surface); border-top: 0.5px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0 max(14px, env(safe-area-inset-bottom)); z-index: 20; }
.nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; background: none; border: none; cursor: pointer; color: var(--muted); font-size: 11px; padding: 0 20px; }
.nav-btn.active { color: var(--accent); }
.nav-icon { font-size: 22px; line-height: 1; }
.btn { border: none; border-radius: var(--radius-sm); padding: 11px 18px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-accent { background: var(--accent); color: white; }
.btn-accent:active { opacity: 0.8; }
.btn-ghost { background: none; color: var(--muted); border: 0.5px solid var(--border); font-size: 14px; font-weight: 500; }
.btn-ghost:active { opacity: 0.7; }
.btn-block { width: 100%; text-align: center; padding: 13px; font-size: 15px; }
.card { background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 14px 16px; margin: 0 14px 10px; }
.card-tap { cursor: pointer; }
.card-tap:active { opacity: 0.75; }
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 14px; margin-bottom: 14px; }
.stat-card { background: var(--surface); border-radius: var(--radius-sm); padding: 14px; text-align: center; border: 0.5px solid var(--border); }
.stat-val { font-size: 24px; font-weight: 700; color: var(--text); }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
.tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 99px; background: var(--accent-light); color: var(--accent-dark); }
input[type="text"], input[type="number"] { width: 100%; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 11px 13px; font-size: 16px; color: var(--text); outline: none; -webkit-appearance: none; }
input:focus { border-color: var(--accent); }
label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 5px; }
.set-row { display: grid; grid-template-columns: 28px 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 8px; }
.set-num { font-size: 13px; color: var(--muted); text-align: center; }
.set-row input { text-align: center; padding: 10px 6px; font-size: 16px; }
.del-btn { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--muted); padding: 6px; }
.section-label { font-size: 13px; color: var(--muted); padding: 14px 14px 6px; font-weight: 500; }
.empty-state { text-align: center; padding: 50px 24px; color: var(--muted); font-size: 15px; }
.empty-icon { font-size: 44px; margin-bottom: 14px; }
.pr-badge { background: #FFF3D6; color: #8a5a00; font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 99px; margin-left: 6px; }
.row { display: flex; justify-content: space-between; align-items: center; }
.exercise-row { padding: 11px 0; border-bottom: 0.5px solid var(--border); }
.exercise-row:last-child { border-bottom: none; }
.chart-tabs { display: flex; gap: 6px; padding: 0 14px 12px; flex-wrap: wrap; }
.chart-tab { background: var(--surface); border: 0.5px solid var(--border); border-radius: 99px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--muted); }
.chart-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.cat-section { padding: 6px 14px 2px; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.cat-item { display: flex; align-items: center; padding: 13px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; }
.cat-item:active { background: var(--bg); }
.cat-item-name { font-size: 15px; color: var(--text); flex: 1; }
.prog-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 14px; }
.prog-stat { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; text-align: center; border: 0.5px solid var(--border); }
.prog-val { font-size: 18px; font-weight: 700; }
.prog-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.sync-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; border-bottom: 0.5px solid var(--border); background: var(--surface); }
#install-banner { background: var(--accent); color: white; text-align: center; padding: 12px 16px; font-size: 13px; font-weight: 500; display: none; }
</style>
</head>
<body>
<div id="app">

<div id="install-banner">📲 Partager → "Sur l'écran d'accueil" pour installer</div>

<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="header">
    <h1>💪 GymLog</h1>
    <button class="btn btn-accent" onclick="startSession()" style="padding:9px 16px;font-size:14px;">+ Séance</button>
  </div>
  <div class="sync-bar">
    <div id="sync-status" style="font-size:12px;color:var(--muted);">☁️ Google Sheets</div>
    <button class="btn btn-ghost" onclick="syncFromSheet()" style="padding:5px 12px;font-size:12px;">↓ Charger</button>
  </div>
  <div class="section-label">Cette semaine</div>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" id="stat-seances">0</div><div class="stat-lbl">Séances</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-volume">0</div><div class="stat-lbl">Kg soulevés</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-exercices">0</div><div class="stat-lbl">Exercices</div></div>
    <div class="stat-card"><div class="stat-val" id="stat-series">0</div><div class="stat-lbl">Séries</div></div>
  </div>
  <div class="section-label">Historique</div>
  <div id="history-list"></div>
</div>

<!-- SESSION -->
<div id="screen-session" class="screen">
  <div class="header">
    <button class="btn btn-ghost" onclick="goHome()" style="padding:8px 14px;">✕</button>
    <h1>Nouvelle séance</h1>
    <button class="btn btn-accent" onclick="saveSession()" style="padding:9px 16px;font-size:14px;">Sauver</button>
  </div>
  <div style="padding:14px 14px 8px;">
    <label>Nom de la séance</label>
    <input type="text" id="session-name" placeholder="Push, Pull, Jambes..." />
  </div>
  <div id="exercises-list"></div>
  <div style="padding:4px 14px 16px;">
    <button class="btn btn-ghost btn-block" onclick="showPicker()">+ Ajouter un exercice</button>
  </div>
</div>

<!-- PICKER -->
<div id="screen-picker" class="screen">
  <div class="header">
    <button class="btn btn-ghost" onclick="showScreen('screen-session')" style="padding:8px 14px;">←</button>
    <h1>Choisir</h1>
  </div>
  <div style="padding:12px 14px 8px;">
    <input type="text" id="search-ex" placeholder="Rechercher..." oninput="filterEx()" />
  </div>
  <div style="padding:0 14px 10px;">
    <button class="btn btn-ghost btn-block" onclick="showScreen('screen-custom')" style="font-size:14px;">✏️ Créer un exercice perso</button>
  </div>
  <div id="catalog"></div>
</div>

<!-- CUSTOM EXERCISE -->
<div id="screen-custom" class="screen">
  <div class="header">
    <button class="btn btn-ghost" onclick="showScreen('screen-picker')" style="padding:8px 14px;">←</button>
    <h1>Nouvel exercice</h1>
  </div>
  <div style="padding:16px 14px;display:flex;flex-direction:column;gap:14px;">
    <div>
      <label>Nom de l'exercice</label>
      <input type="text" id="custom-name" placeholder="Ex: Leg press, Face pull..." />
    </div>
    <div>
      <label>Groupe musculaire</label>
      <input type="text" id="custom-muscle" placeholder="Ex: Jambes, Épaules..." />
    </div>
    <button class="btn btn-accent btn-block" onclick="saveCustomEx()">Ajouter cet exercice</button>
  </div>
  <div class="section-label">Mes exercices personnalisés</div>
  <div id="custom-list"></div>
</div>

<!-- STATS -->
<div id="screen-stats" class="screen">
  <div class="header"><h1 id="stats-title">📈 Progression</h1></div>
  <div id="stats-content"></div>
</div>

<!-- PROGRESS -->
<div id="screen-progress" class="screen">
  <div class="header">
    <button class="btn btn-ghost" onclick="goStats()" style="padding:8px 14px;">←</button>
    <h1 id="progress-title" style="font-size:16px;">Progression</h1>
  </div>
  <div style="padding:12px 0 0;">
    <div id="metric-tabs" class="chart-tabs"></div>
    <div style="padding:0 14px;">
      <div style="position:relative;width:100%;height:250px;">
        <canvas id="progressChart"></canvas>
      </div>
    </div>
    <div id="prog-stats" class="prog-grid"></div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="goHome()">
    <span class="nav-icon">🏠</span><span>Accueil</span>
  </button>
  <button class="nav-btn" id="nav-stats" onclick="goStats()">
    <span class="nav-icon">📈</span><span>Stats</span>
  </button>
</nav>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyRojKlhTVqnQjOaGl36i19hznep9YAwbLOxuTLXZf0XWiLKQv4m0gzpcQUnRsTwMqj/exec';

const EX_LIST = [
  { name: "Développé couché", muscle: "Pectoraux" },
  { name: "Développé incliné", muscle: "Pectoraux" },
  { name: "Écartés haltères", muscle: "Pectoraux" },
  { name: "Tractions", muscle: "Dos" },
  { name: "Rowing barre", muscle: "Dos" },
  { name: "Tirage vertical", muscle: "Dos" },
  { name: "Rowing haltère", muscle: "Dos" },
  { name: "Soulevé de terre", muscle: "Dos / Jambes" },
  { name: "Développé militaire", muscle: "Épaules" },
  { name: "Élévations latérales", muscle: "Épaules" },
  { name: "Oiseau", muscle: "Épaules" },
  { name: "Curl biceps", muscle: "Biceps" },
  { name: "Curl marteau", muscle: "Biceps" },
  { name: "Dips", muscle: "Triceps" },
  { name: "Extensions triceps", muscle: "Triceps" },
  { name: "Squat", muscle: "Jambes" },
  { name: "Presse à cuisses", muscle: "Jambes" },
  { name: "Fentes", muscle: "Jambes" },
  { name: "Leg curl", muscle: "Jambes" },
  { name: "Mollets", muscle: "Jambes" },
  { name: "Gainage", muscle: "Abdos" },
  { name: "Crunchs", muscle: "Abdos" },
];

let sessions = JSON.parse(localStorage.getItem('gymlog_v2') || '[]');
let customExercises = JSON.parse(localStorage.getItem('gymlog_custom') || '[]');
let currentExs = [];
let progressChart = null;
let currentProgressEx = null;
let currentMetric = 'weight';

// iOS banner
if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !navigator.standalone)
  document.getElementById('install-banner').style.display = 'block';

function save() { localStorage.setItem('gymlog_v2', JSON.stringify(sessions)); }
function saveCustom() { localStorage.setItem('gymlog_custom', JSON.stringify(customExercises)); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
function setNav(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (id) document.getElementById(id).classList.add('active');
}
function goHome() { currentExs = []; renderHome(); showScreen('screen-home'); setNav('nav-home'); }
function goStats() { renderStats(); showScreen('screen-stats'); setNav('nav-stats'); }

// ── SYNC ─────────────────────────────────────────────────
function setSyncStatus(icon, text, color) {
  document.getElementById('sync-status').innerHTML =
    icon + ' <span style="color:' + (color||'var(--muted)') + '">' + text + '</span>';
}

async function syncToSheet(session) {
  setSyncStatus('🔄', 'Sauvegarde...', '#888');
  try {
    const res = await fetch(SHEET_URL, { method: 'POST', body: JSON.stringify(session) });
    const data = await res.json();
    data.ok ? setSyncStatus('☁️', 'Sauvegardé ✓', '#3B6D11') : setSyncStatus('⚠️', 'Erreur serveur', '#A32D2D');
  } catch(e) { setSyncStatus('⚠️', 'Hors ligne — local OK', '#A32D2D'); }
}

async function syncFromSheet() {
  setSyncStatus('🔄', 'Chargement...', '#888');
  try {
    const res = await fetch(SHEET_URL);
    const rows = await res.json();
    if (!rows || rows.length < 2) { setSyncStatus('☁️', 'Aucune donnée distante', '#888'); return; }
    const map = {};
    rows.slice(1).forEach(r => {
      const date = r[0], sName = r[1], exName = r[2], muscle = r[3], reps = r[5], weight = r[6];
      if (!date) return;
      const key = date + '|' + sName;
      if (!map[key]) map[key] = { id: new Date(date).getTime(), date: date, name: sName, exercises: [] };
      let ex = map[key].exercises.find(e => e.name === exName);
      if (!ex) { ex = { name: exName, muscle: muscle, sets: [] }; map[key].exercises.push(ex); }
      ex.sets.push({ reps: String(reps), weight: String(weight) });
    });
    const remote = Object.values(map).sort((a, b) => new Date(b.date) - new Date(a.date));
    const localKeys = new Set(sessions.map(s => s.date + '|' + s.name));
    remote.forEach(rs => { if (!localKeys.has(rs.date + '|' + rs.name)) sessions.push(rs); });
    sessions.sort((a, b) => new Date(b.date) - new Date(a.date));
    save();
    renderHome();
    setSyncStatus('☁️', remote.length + ' séances chargées', '#3B6D11');
  } catch(e) { setSyncStatus('⚠️', 'Impossible de charger', '#A32D2D'); }
}

// ── SESSION ──────────────────────────────────────────────
function startSession() {
  currentExs = [];
  document.getElementById('session-name').value = '';
  renderExList();
  showScreen('screen-session');
  setNav(null);
}

function showPicker() {
  document.getElementById('search-ex').value = '';
  filterEx();
  showScreen('screen-picker');
}

function filterEx() {
  const q = document.getElementById('search-ex').value.toLowerCase();
  const all = [...EX_LIST, ...customExercises];
  const filtered = all.filter(e => e.name.toLowerCase().includes(q) || e.muscle.toLowerCase().includes(q));
  const el = document.getElementById('catalog');
  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div>Aucun résultat</div>';
    return;
  }
  el.innerHTML = '';
  let lastM = '';
  filtered.forEach(ex => {
    if (ex.muscle !== lastM) {
      const sep = document.createElement('div');
      sep.className = 'cat-section';
      sep.textContent = ex.muscle;
      el.appendChild(sep);
      lastM = ex.muscle;
    }
    const item = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = '<span class="cat-item-name">' + ex.name + '</span><span style="font-size:13px;color:var(--muted);">›</span>';
    item.addEventListener('click', function() {
      currentExs.push({ name: ex.name, muscle: ex.muscle, sets: [{ reps: '', weight: '' }] });
      renderExList();
      showScreen('screen-session');
    });
    el.appendChild(item);
  });
}

function renderExList() {
  const el = document.getElementById('exercises-list');
  if (!currentExs.length) {
    el.innerHTML = '<div class="empty-state" style="padding:30px 24px"><div class="empty-icon">🏋️</div>Ajoutez votre premier exercice</div>';
    return;
  }
  el.innerHTML = '';
  currentExs.forEach(function(ex, ei) {
    const pr = getPR(ex.name);
    const card = document.createElement('div');
    card.className = 'card';

    const header = document.createElement('div');
    header.className = 'row';
    header.style.marginBottom = '10px';
    header.innerHTML = '<div><span style="font-size:15px;font-weight:600;">' + ex.name + '</span>' + (pr ? '<span class="pr-badge">RP ' + pr + 'kg</span>' : '') + '<br><span class="tag" style="margin-top:4px;">' + ex.muscle + '</span></div>';
    const delEx = document.createElement('button');
    delEx.className = 'del-btn';
    delEx.textContent = '✕';
    delEx.addEventListener('click', function() { currentExs.splice(ei, 1); renderExList(); });
    header.appendChild(delEx);
    card.appendChild(header);

    const colHeaders = document.createElement('div');
    colHeaders.style.cssText = 'display:grid;grid-template-columns:28px 1fr 1fr 36px;gap:8px;margin-bottom:6px;';
    colHeaders.innerHTML = '<span></span><div style="font-size:11px;color:var(--muted);text-align:center;font-weight:500;">REPS</div><div style="font-size:11px;color:var(--muted);text-align:center;font-weight:500;">KG</div><span></span>';
    card.appendChild(colHeaders);

    const setsContainer = document.createElement('div');
    ex.sets.forEach(function(s, si) {
      const row = document.createElement('div');
      row.className = 'set-row';
      const num = document.createElement('span');
      num.className = 'set-num';
      num.textContent = si + 1;
      const repsInput = document.createElement('input');
      repsInput.type = 'number';
      repsInput.setAttribute('inputmode', 'numeric');
      repsInput.min = '0';
      repsInput.placeholder = '—';
      repsInput.value = s.reps;
      repsInput.style.textAlign = 'center';
      repsInput.style.padding = '10px 6px';
      repsInput.addEventListener('input', function() { currentExs[ei].sets[si].reps = this.value; });
      const weightInput = document.createElement('input');
      weightInput.type = 'number';
      weightInput.setAttribute('inputmode', 'decimal');
      weightInput.min = '0';
      weightInput.step = '0.5';
      weightInput.placeholder = '—';
      weightInput.value = s.weight;
      weightInput.style.textAlign = 'center';
      weightInput.style.padding = '10px 6px';
      weightInput.addEventListener('input', function() { currentExs[ei].sets[si].weight = this.value; });
      const delSet = document.createElement('button');
      delSet.className = 'del-btn';
      delSet.textContent = '✕';
      delSet.addEventListener('click', function() {
        if (currentExs[ei].sets.length > 1) { currentExs[ei].sets.splice(si, 1); renderExList(); }
      });
      row.appendChild(num);
      row.appendChild(repsInput);
      row.appendChild(weightInput);
      row.appendChild(delSet);
      setsContainer.appendChild(row);
    });
    card.appendChild(setsContainer);

    const addSetBtn = document.createElement('button');
    addSetBtn.className = 'btn btn-ghost';
    addSetBtn.style.cssText = 'width:100%;text-align:center;padding:9px;font-size:14px;margin-top:4px;';
    addSetBtn.textContent = '+ Série';
    addSetBtn.addEventListener('click', function() { currentExs[ei].sets.push({ reps: '', weight: '' }); renderExList(); });
    card.appendChild(addSetBtn);

    el.appendChild(card);
  });
}

function saveSession() {
  if (!currentExs.length) { alert('Ajoutez au moins un exercice !'); return; }
  const name = document.getElementById('session-name').value.trim() || 'Séance';
  const session = { id: Date.now(), date: new Date().toISOString(), name: name, exercises: JSON.parse(JSON.stringify(currentExs)) };
  sessions.unshift(session);
  save();
  syncToSheet(session);
  goHome();
}

// ── CUSTOM EXERCISES ─────────────────────────────────────
function saveCustomEx() {
  const name = document.getElementById('custom-name').value.trim();
  const muscle = document.getElementById('custom-muscle').value.trim() || 'Autre';
  if (!name) { alert('Entre un nom pour l\'exercice'); return; }
  customExercises.push({ name: name, muscle: muscle });
  saveCustom();
  document.getElementById('custom-name').value = '';
  document.getElementById('custom-muscle').value = '';
  renderCustomList();
  filterEx();
}

function renderCustomList() {
  const el = document.getElementById('custom-list');
  if (!customExercises.length) {
    el.innerHTML = '<div class="empty-state" style="padding:20px 24px"><div class="empty-icon">✏️</div>Aucun exercice perso</div>';
    return;
  }
  el.innerHTML = '';
  customExercises.forEach(function(ex, i) {
    const item = document.createElement('div');
    item.className = 'cat-item';
    item.innerHTML = '<div style="flex:1;"><div class="cat-item-name">' + ex.name + '</div><span class="tag" style="margin-top:3px;display:inline-block;">' + ex.muscle + '</span></div>';
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn';
    delBtn.style.color = 'var(--accent)';
    delBtn.textContent = '🗑';
    delBtn.addEventListener('click', function() { customExercises.splice(i, 1); saveCustom(); renderCustomList(); });
    item.appendChild(delBtn);
    el.appendChild(item);
  });
}

// ── HOME ─────────────────────────────────────────────────
function getPR(name) {
  let max = 0;
  sessions.forEach(s => s.exercises.forEach(ex => {
    if (ex.name === name) ex.sets.forEach(set => { const w = parseFloat(set.weight); if (!isNaN(w) && w > max) max = w; });
  }));
  return max > 0 ? max : null;
}

function renderHome() {
  const weekAgo = Date.now() - 7 * 864e5;
  const week = sessions.filter(s => new Date(s.date).getTime() > weekAgo);
  let vol = 0, exCount = 0, setCount = 0;
  week.forEach(s => s.exercises.forEach(ex => {
    exCount++;
    ex.sets.forEach(set => { setCount++; vol += (parseFloat(set.weight) || 0) * (parseInt(set.reps) || 0); });
  }));
  document.getElementById('stat-seances').textContent = week.length;
  document.getElementById('stat-volume').textContent = Math.round(vol);
  document.getElementById('stat-exercices').textContent = exCount;
  document.getElementById('stat-series').textContent = setCount;

  const el = document.getElementById('history-list');
  if (!sessions.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏅</div>Aucune séance enregistrée<br><br>Appuie sur <strong>+ Séance</strong> pour commencer !</div>';
    return;
  }
  el.innerHTML = '';
  sessions.forEach(function(s) {
    const d = new Date(s.date);
    const ds = d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
    let v = 0;
    s.exercises.forEach(ex => ex.sets.forEach(set => { v += (parseFloat(set.weight) || 0) * (parseInt(set.reps) || 0); }));
    const muscles = [...new Set(s.exercises.map(e => e.muscle))].map(m => '<span class="tag">' + m + '</span>').join('');
    const div = document.createElement('div');
    div.className = 'card card-tap';
    div.innerHTML = '<div class="row"><div><div style="font-size:16px;font-weight:600;">' + s.name + '</div><div style="font-size:13px;color:var(--muted);margin-top:2px;">' + ds + '</div></div><div style="text-align:right;"><div style="font-size:15px;font-weight:600;">' + Math.round(v) + ' kg</div><div style="font-size:12px;color:var(--muted);">' + s.exercises.length + ' exercices</div></div></div><div style="margin-top:9px;display:flex;flex-wrap:wrap;gap:5px;">' + muscles + '</div>';
    div.addEventListener('click', function() { viewSession(s.id); });
    el.appendChild(div);
  });
}

function viewSession(id) {
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  const d = new Date(s.date);
  const ds = d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
  const el = document.getElementById('stats-content');
  el.innerHTML = '<div class="section-label">' + ds + '</div>';
  s.exercises.forEach(function(ex) {
    let vol = 0, bestW = 0;
    ex.sets.forEach(set => { const w = parseFloat(set.weight) || 0, r = parseInt(set.reps) || 0; vol += w * r; if (w > bestW) bestW = w; });
    const rows = ex.sets.map((set, i) => '<div class="exercise-row row"><span style="font-size:13px;color:var(--muted);">Série ' + (i+1) + '</span><span style="font-size:15px;font-weight:500;">' + (set.reps || '—') + ' × ' + (set.weight || '—') + ' kg</span></div>').join('');
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = '<div style="font-size:15px;font-weight:600;margin-bottom:4px;">' + ex.name + ' <span class="tag">' + ex.muscle + '</span></div>' + rows + '<div style="margin-top:8px;font-size:12px;color:var(--muted);">Volume : <strong>' + Math.round(vol) + ' kg</strong> · Meilleure : <strong>' + bestW + ' kg</strong></div>';
    el.appendChild(div);
  });
  document.getElementById('stats-title').textContent = s.name;
  showScreen('screen-stats');
  setNav('nav-stats');
}

// ── STATS ────────────────────────────────────────────────
function renderStats() {
  document.getElementById('stats-title').textContent = '📈 Progression';
  const el = document.getElementById('stats-content');
  if (!sessions.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>Pas encore de données</div>'; return; }
  const exMap = {};
  sessions.forEach(s => s.exercises.forEach(ex => {
    if (!exMap[ex.name]) exMap[ex.name] = { muscle: ex.muscle, maxW: 0, sets: 0 };
    ex.sets.forEach(set => { const w = parseFloat(set.weight) || 0; if (w > exMap[ex.name].maxW) exMap[ex.name].maxW = w; exMap[ex.name].sets++; });
  }));
  const sorted = Object.entries(exMap).sort((a, b) => b[1].maxW - a[1].maxW);
  el.innerHTML = '<div class="section-label">Appuie sur un exercice pour voir sa progression</div>';
  sorted.forEach(function(entry) {
    const name = entry[0], d = entry[1];
    const div = document.createElement('div');
    div.className = 'card card-tap';
    div.innerHTML = '<div class="row"><div><div style="font-size:15px;font-weight:600;">' + name + '</div><span class="tag" style="margin-top:5px;display:inline-block;">' + d.muscle + '</span></div><div style="display:flex;align-items:center;gap:10px;"><div style="text-align:right;"><div style="font-size:20px;font-weight:700;color:var(--accent);">' + d.maxW + ' kg</div><div style="font-size:12px;color:var(--muted);">' + d.sets + ' séries</div></div><span style="font-size:20px;color:var(--muted);">›</span></div></div>';
    div.addEventListener('click', function() { showProgress(name); });
    el.appendChild(div);
  });
}

// ── PROGRESS CHART ───────────────────────────────────────
function getProgressData(name) {
  const pts = [];
  var reversed = sessions.slice().reverse();
  reversed.forEach(function(s) {
    var maxW = 0, vol = 0, maxR = 0;
    s.exercises.forEach(function(ex) {
      if (ex.name === name) ex.sets.forEach(function(set) {
        var w = parseFloat(set.weight) || 0, r = parseInt(set.reps) || 0;
        if (w > maxW) maxW = w;
        if (r > maxR) maxR = r;
        vol += w * r;
      });
    });
    if (maxW > 0 || maxR > 0) {
      var d = new Date(s.date);
      pts.push({ label: d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' }), weight: maxW, volume: Math.round(vol), reps: maxR });
    }
  });
  return pts;
}

function showProgress(name) {
  currentProgressEx = name;
  currentMetric = 'weight';
  document.getElementById('progress-title').textContent = name;
  drawProgress();
  showScreen('screen-progress');
}

function drawProgress() {
  var data = getProgressData(currentProgressEx);
  var metrics = [{ key: 'weight', label: 'Poids max' }, { key: 'volume', label: 'Volume' }, { key: 'reps', label: 'Reps max' }];
  var tabsEl = document.getElementById('metric-tabs');
  tabsEl.innerHTML = '';
  metrics.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'chart-tab' + (currentMetric === m.key ? ' active' : '');
    btn.textContent = m.label;
    btn.addEventListener('click', function() { currentMetric = m.key; drawProgress(); });
    tabsEl.appendChild(btn);
  });
  var isDark = matchMedia('(prefers-color-scheme:dark)').matches;
  var grid = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.07)';
  var accent = '#E24B4A';
  if (progressChart) { progressChart.destroy(); progressChart = null; }
  if (!data.length) {
    document.getElementById('prog-stats').innerHTML = '<div class="empty-state" style="padding:20px"><div class="empty-icon">📉</div>Pas encore assez de données</div>';
    return;
  }
  var vals = data.map(function(p) { return p[currentMetric]; });
  progressChart = new Chart(document.getElementById('progressChart'), {
    type: 'line',
    data: {
      labels: data.map(function(p) { return p.label; }),
      datasets: [{ data: vals, borderColor: accent, backgroundColor: 'rgba(226,75,74,0.08)', borderWidth: 2.5, pointBackgroundColor: accent, pointRadius: 5, pointHoverRadius: 7, fill: true, tension: 0.4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx) { return ctx.parsed.y + (currentMetric === 'reps' ? ' reps' : ' kg'); } } } },
      scales: {
        x: { grid: { color: grid }, ticks: { color: '#888', font: { size: 11 }, maxRotation: 40, autoSkip: true } },
        y: { grid: { color: grid }, ticks: { color: '#888', font: { size: 11 } }, beginAtZero: false }
      }
    }
  });
  var first = vals[0], last = vals[vals.length - 1], max = Math.max.apply(null, vals);
  var diff = parseFloat((last - first).toFixed(1));
  var up = diff >= 0;
  var u = currentMetric === 'reps' ? ' reps' : ' kg';
  var col = up ? '#3B6D11' : '#A32D2D';
  var bg = up ? '#EAF3DE' : '#FCEBEB';
  document.getElementById('prog-stats').innerHTML =
    '<div class="prog-stat"><div class="prog-val">' + max + u + '</div><div class="prog-lbl">Record</div></div>' +
    '<div class="prog-stat"><div class="prog-val">' + last + u + '</div><div class="prog-lbl">Dernière</div></div>' +
    '<div class="prog-stat" style="background:' + bg + ';border-color:' + bg + ';"><div class="prog-val" style="color:' + col + ';font-size:16px;">' + (up ? '▲' : '▼') + ' ' + Math.abs(diff) + u + '</div><div class="prog-lbl" style="color:' + col + ';">évolution</div></div>';
}

// ── INIT ─────────────────────────────────────────────────
renderHome();
filterEx();
renderCustomList();
syncFromSheet();
</script>
